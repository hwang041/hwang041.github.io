{% include toc-status.html %}

{% if enable_toc %}
  <section id="toc" class="mt-4">
    <div>
      <div class="py-2 font-weight-medium text-dark">目录</div>
      <div class="toc-content">
        <nav id="toc-nav"></nav>
      </div>
    </div>
  </section>
{% endif %}

<style>
#toc {
  margin-top: 1rem;
}

.toc-content {
  max-height: calc(100vh - 250px);
  overflow-y: auto;
  padding: 0;
}

.toc-content::-webkit-scrollbar {
  width: 6px;
}

.toc-content::-webkit-scrollbar-track {
  background-color: #f6f8fa;
  border-radius: 3px;
}

.toc-content::-webkit-scrollbar-thumb {
  background-color: #d1d9e0;
  border-radius: 3px;
  transition: background-color 0.2s ease;
}

.toc-content::-webkit-scrollbar-thumb:hover {
  background-color: #9aa5b1;
}

#toc-nav ul {
  list-style: none;
  padding-left: 0;
  margin: 0;
}

#toc-nav li {
  position: relative;
}

#toc-nav a {
  color: #24292e;
  display: block;
  padding: 0.25rem 0;
  font-size: 0.875rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.2s ease;
}

#toc-nav a:hover {
  color: #0366d6;
  text-decoration: none;
  background-color: transparent;
}

#toc-nav a.active {
  color: #0366d6;
  background-color: #f6f8fa;
  font-weight: 500;
  padding: 0.25rem 0;
}

/* 响应式设计 */
@media (max-width: 992px) {
  .toc-content {
    max-height: 300px;
  }
}
</style>
